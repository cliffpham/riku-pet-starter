<svg width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc" xmlns="http://www.w3.org/2000/svg">
  <title id="title">baby alien happy</title>
  <desc id="desc">A cute alien virtual pet in the baby growth stage with a happy mood.</desc>
  <defs>
    <linearGradient id="skin" x1="72" x2="188" y1="54" y2="224" gradientUnits="userSpaceOnUse">
      <stop stop-color="#d9fff2"/>
